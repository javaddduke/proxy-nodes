name: 自动更新 nodes.txt（PR 方式）

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行采集脚本
        run: python collect.py

      - name: 创建/更新 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: actions/update-nodes
          title: "🔄 自动更新节点"
          commit-message: "🔄 自动更新 nodes.txt"
          delete-branch: true
          add-paths: nodes.txt
