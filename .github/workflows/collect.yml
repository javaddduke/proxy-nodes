name: 自动采集节点

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 👇 关键：使用你刚才配置的个人 Token 绕过限制
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行节点采集
        run: python collect.py

      - name: 提交并推送
        run: |
          # 👇 换成你自己的真实 GitHub 账号信息
          git config --global user.name "javaddduke"
          git config --global user.email "javaddduke@users.noreply.github.com"
          
          git add nodes.txt
          # 检查是否有内容变化，有变化才提交推送
          if ! git diff --cached --quiet; then
            git commit -m "🔄 自动更新节点 $(date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:main
          else
            echo "节点内容无变化，跳过推送。"
          fi
