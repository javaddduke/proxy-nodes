name: 自动采集节点

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# ====== 新增这一块 ======
permissions:
  contents: write
# ========================

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 运行节点采集
        run: |
          python collect.py
      
      - name: 检查输出文件
        run: |
          if [ -f "nodes.txt" ]; then
            echo "✅ nodes.txt 已生成"
            echo "节点数量: $(wc -l < nodes.txt)"
          else
            echo "❌ nodes.txt 未生成"
            exit 1
          fi
      
      - name: 提交更新
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add nodes.txt
          git diff --staged --quiet || git commit -m "🔄 自动更新节点 $(date '+%Y-%m-%d %H:%M')"
          git push
