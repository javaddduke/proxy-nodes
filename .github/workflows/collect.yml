name: 自动采集节点

# 触发条件
on:
  # 定时触发：每6小时运行一次（UTC时间，北京时间+8小时）
  schedule:
    - cron: '0 */6 * * *'   # 每天0、6、12、18点（UTC）
  # 也可以手动触发
  workflow_dispatch:

# 工作流程
jobs:
  collect:
    # 使用最新的Ubuntu虚拟机
    runs-on: ubuntu-latest
    
    # 设置时区
    environment:
      name: production
    
    steps:
      # 1. 将你的代码检出到虚拟机
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 2. 设置Python环境
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      # 4. 运行采集脚本
      - name: 运行节点采集
        run: |
          python collect.py
      
      # 5. 检查生成的节点文件
      - name: 检查输出文件
        run: |
          if [ -f "nodes.txt" ]; then
            echo "✅ nodes.txt 已生成"
            echo "节点数量: $(wc -l < nodes.txt)"
          else
            echo "❌ nodes.txt 未生成"
            exit 1
          fi
      
      # 6. 提交更新回仓库
      - name: 提交更新
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add nodes.txt
          # 只在有变化时提交
          git diff --staged --quiet || git commit -m "🔄 自动更新节点 $(date '+%Y-%m-%d %H:%M')"
          git push
