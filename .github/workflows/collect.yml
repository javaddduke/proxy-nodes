name: 自动采集节点

# 👇 必须有这段权限声明
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    
    # 👇 job级别也加一遍，更稳
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 👇 显式使用 token
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 运行节点采集
        run: python collect.py
      
      - name: 检查输出文件
        run: |
          if [ -f "nodes.txt" ]; then
            echo "✅ nodes.txt 已生成"
            echo "节点数量: $(wc -l < nodes.txt)"
          else
            echo "❌ nodes.txt 未生成"
            exit 1
          fi
      
      - name: 提交更新
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add nodes.txt
          git diff --staged --quiet || git commit -m "🔄 自动更新节点 $(date '+%Y-%m-%d %H:%M')"
          git push
